name: SPARQL
description: >-
  SPARQL (SPARQL Protocol and RDF Query Language) is a W3C Recommendation
  that provides a standardized query language for retrieving and manipulating
  data stored in Resource Description Framework (RDF) format. It includes
  a protocol for submitting queries and updates over HTTP, a JSON results
  format for SELECT and ASK queries, and a Graph Store HTTP Protocol for
  managing RDF graphs. SPARQL 1.1 supports complex graph pattern matching,
  optional values, unions, filters, aggregation, subqueries, and federated
  queries across distributed endpoints.
url: https://www.w3.org/TR/sparql11-overview/
tags:
- SPARQL
- RDF
- Query Language
